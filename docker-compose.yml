services:

  # ── PostgreSQL for user_management_service ──────────────────────────────────
  postgres_user_mgmt:
    image: postgres:16-alpine
    container_name: postgres_user_mgmt
    restart: unless-stopped
    environment:
      POSTGRES_USER: capitalism_user
      POSTGRES_PASSWORD: capitalism_pass
      POSTGRES_DB: user_management_db
    volumes:
      - pg_user_mgmt_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capitalism_user -d user_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL for enterprise_management_service ────────────────────────────
  postgres_enterprise:
    image: postgres:16-alpine
    container_name: postgres_enterprise
    restart: unless-stopped
    environment:
      POSTGRES_USER: capitalism_user
      POSTGRES_PASSWORD: capitalism_pass
      POSTGRES_DB: enterprise_management_db
    volumes:
      - pg_enterprise_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capitalism_user -d enterprise_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── User Management Service (3 replicas) ────────────────────────────────────
  user_management_service:
    build:
      context: ./user_management_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_user_mgmt:5432/user_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    expose:
      - "8001"
    depends_on:
      postgres_user_mgmt:
        condition: service_healthy
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  # ── Enterprise Management Service (3 replicas) ──────────────────────────────
  enterprise_management_service:
    build:
      context: ./enterprise_management_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_enterprise:5432/enterprise_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      USER_SERVICE_URL: http://user_management_service:8001
    expose:
      - "8002"
    depends_on:
      postgres_enterprise:
        condition: service_healthy
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  # ── API Gateway ──────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"   # single public entry-point
    depends_on:
      - user_management_service
      - enterprise_management_service

  # ── pgAdmin ──────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_user_mgmt
      - postgres_enterprise

volumes:
  pg_user_mgmt_data:
  pg_enterprise_data:
