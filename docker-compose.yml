services:

  # ── PostgreSQL for user_management_service ──────────────────────────────────
  postgres_user_mgmt:
    image: postgres:16-alpine
    container_name: postgres_user_mgmt
    restart: unless-stopped
    environment:
      POSTGRES_USER: capitalism_user
      POSTGRES_PASSWORD: capitalism_pass
      POSTGRES_DB: user_management_db
    volumes:
      - pg_user_mgmt_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capitalism_user -d user_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL for enterprise_management_service ────────────────────────────
  postgres_enterprise:
    image: postgres:16-alpine
    container_name: postgres_enterprise
    restart: unless-stopped
    environment:
      POSTGRES_USER: capitalism_user
      POSTGRES_PASSWORD: capitalism_pass
      POSTGRES_DB: enterprise_management_db
    volumes:
      - pg_enterprise_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capitalism_user -d enterprise_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── User Management Service — 3 named replicas ──────────────────────────────
  user_management_service_1:
    build:
      context: ./user_management_service
      dockerfile: Dockerfile
    container_name: user_management_service_1
    hostname: user_management_service_1
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_user_mgmt:5432/user_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REPLICA_ID: "user-1"
    expose:
      - "8001"
    depends_on:
      postgres_user_mgmt:
        condition: service_healthy

  user_management_service_2:
    build:
      context: ./user_management_service
      dockerfile: Dockerfile
    container_name: user_management_service_2
    hostname: user_management_service_2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_user_mgmt:5432/user_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REPLICA_ID: "user-2"
    expose:
      - "8001"
    depends_on:
      postgres_user_mgmt:
        condition: service_healthy

  user_management_service_3:
    build:
      context: ./user_management_service
      dockerfile: Dockerfile
    container_name: user_management_service_3
    hostname: user_management_service_3
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_user_mgmt:5432/user_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REPLICA_ID: "user-3"
    expose:
      - "8001"
    depends_on:
      postgres_user_mgmt:
        condition: service_healthy

  # ── Enterprise Management Service — 3 named replicas ────────────────────────
  enterprise_management_service_1:
    build:
      context: ./enterprise_management_service
      dockerfile: Dockerfile
    container_name: enterprise_management_service_1
    hostname: enterprise_management_service_1
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_enterprise:5432/enterprise_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      USER_SERVICE_URL: http://user_management_service_1:8001
      REPLICA_ID: "enterprise-1"
    expose:
      - "8002"
    depends_on:
      postgres_enterprise:
        condition: service_healthy

  enterprise_management_service_2:
    build:
      context: ./enterprise_management_service
      dockerfile: Dockerfile
    container_name: enterprise_management_service_2
    hostname: enterprise_management_service_2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_enterprise:5432/enterprise_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      USER_SERVICE_URL: http://user_management_service_1:8001
      REPLICA_ID: "enterprise-2"
    expose:
      - "8002"
    depends_on:
      postgres_enterprise:
        condition: service_healthy

  enterprise_management_service_3:
    build:
      context: ./enterprise_management_service
      dockerfile: Dockerfile
    container_name: enterprise_management_service_3
    hostname: enterprise_management_service_3
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://capitalism_user:capitalism_pass@postgres_enterprise:5432/enterprise_management_db
      SECRET_KEY: changeme_use_a_long_random_string_in_production
      ALGORITHM: HS256
      USER_SERVICE_URL: http://user_management_service_1:8001
      REPLICA_ID: "enterprise-3"
    expose:
      - "8002"
    depends_on:
      postgres_enterprise:
        condition: service_healthy

  # ── Redis Cache (used by the gateway) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # ── API Gateway ──────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      PORT: "8000"
      REDIS_URL: "redis://redis:6379"
      CACHE_TTL: "30"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      user_management_service_1:
        condition: service_started
      user_management_service_2:
        condition: service_started
      user_management_service_3:
        condition: service_started
      enterprise_management_service_1:
        condition: service_started
      enterprise_management_service_2:
        condition: service_started
      enterprise_management_service_3:
        condition: service_started

  # ── pgAdmin ──────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_user_mgmt
      - postgres_enterprise

volumes:
  pg_user_mgmt_data:
  pg_enterprise_data:
  redis_data:
